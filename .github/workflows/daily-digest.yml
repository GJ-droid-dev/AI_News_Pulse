name: AI News Pulse - Daily Digest
on:
  schedule:
    - cron: '30 3 * * *'  # Runs at 03:30 UTC (09:00 IST) every day
  workflow_dispatch: {}     # Allows manual triggering from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Phase 2 (Ingestion)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python src/scrape.py

      - name: Run Phase 3 (Embedding)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: python src/embed.py

      - name: Run Phase 4 (Digest Generation)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/generate_digest.py
