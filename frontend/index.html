<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Pulse — Your Daily AI Digest</title>
    <meta name="description" content="A premium daily digest of the most important Artificial Intelligence news, papers, and model releases.">
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Material Web (M3) Setup -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <script type="importmap">
      {
        "imports": {
          "@material/web/": "https://esm.run/@material/web/"
        }
      }
    </script>
    <script type="module">
      import '@material/web/all.js';
    </script>
</head>
<body class="light-mode">
    <!-- Prevent White Flash (FOUC) by immediately applying saved theme -->
    <script>
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            document.body.className = savedTheme;
        }
    </script>
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo">AI News Pulse <span class="badge">Home</span></h1>
            <div class="nav-actions">
                <md-text-button href="today.html">Today</md-text-button>
                <md-text-button href="archive.html">Archive</md-text-button>
                <md-icon-button id="theme-toggle" aria-label="Toggle Dark Mode">
                    <md-icon>dark_mode</md-icon>
                </md-icon-button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Status Bar -->
        <div class="status-bar">
            <span id="last-updated-text">Loading latest digest...</span>
        </div>
        
        <!-- Nothing New Banner (Hidden by default) -->
        <div id="nothing-new-banner" class="hidden">
            <div class="banner-content">
                <md-icon>info</md-icon>
                <p>Nothing new for now. Here is the latest available news.</p>
            </div>
        </div>

        <!-- Error State -->
        <div id="error-container" class="error-box hidden">
            <p>Failed to load today's digest. Please try again later or check the archive.</p>
        </div>

        <!-- Digest Content -->
        <div id="digest-content" class="hidden">
            <!-- Hero Section -->
            <section class="hero-card m3-card">
                <div class="hero-label">⭐ HIGHLIGHT OF THE DAY</div>
                <div id="executive-summary" class="hero-content">
                    <!-- JS injects summary here -->
                </div>
            </section>

            <!-- Dynamic Category Accordions -->
            <div id="categories-container" class="accordion-group">
                <!-- JS extracts markdown headings and injects accordions here -->
            </div>
        </div>
    </main>

    <!-- Footer removed as per M3 restructure -->

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
