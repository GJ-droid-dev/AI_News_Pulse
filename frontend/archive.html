<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive — AI News Pulse</title>
    <meta name="description" content="Browse past daily digests of Artificial Intelligence news and releases.">
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="light-mode">
    <header class="navbar">
        <div class="nav-container">
            <h1 class="logo">AI News Pulse <span class="badge">Archive</span></h1>
            <div class="nav-actions">
                <a href="index.html" class="nav-link">← Back to Today</a>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle Dark Mode">
                    🌙
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Error State -->
        <div id="error-container" class="error-box hidden">
            <p>Failed to load the archive history. Please try again later.</p>
        </div>

        <section class="archive-header">
            <h2>Past Digests</h2>
            <p>Browse through historical AI news digests seamlessly generated by our autonomous RAG pipeline.</p>
        </section>

        <!-- Archive Grid -->
        <div id="archive-list" class="archive-grid">
            <!-- JavaScript (app.js) will inject the historical digest cards here -->
            <p class="loading-text">Loading historical digests...</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <p>&copy; 2026 AI News Pulse. Built with RAG technology.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <!-- We can reuse app.js to fetch the archive list if we detect we're on the archive page -->
    <script src="js/app.js"></script>
</body>
</html>
