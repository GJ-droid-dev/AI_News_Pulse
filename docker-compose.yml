version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai_news_pulse_db
    environment:
      POSTGRES_USER: ainewspulse
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ainewspulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
